data:
  raw_path: data/raw
  processed_path: data/processed
  result_path: data/results
  report_path: reports

external:
  astock_data_path: external/a-stock-data
  live_enabled: false
  cache_enabled: true
  request_timeout: 15
  em_min_interval: 1.0
  max_fetch_codes:
  astock_codes: []
  update_start_date:
  update_end_date:
  stock_list_fs: "m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:2048"
  stock_list_page_size: 100
  sector_page_size: 100
  fund_flow_limit: 120
  show_progress: false

universe:
  exclude_st: true
  exclude_suspended: true
  exclude_bj: true
  earnings_blackout_days: 0
  lockup_blackout_days: 0
  min_listing_days: 60
  min_turnover_amount: 200000000
  min_avg_turnover_amount_20d: 80000000
  min_avg_turnover_rate_20d: 0.01
  # 市值门槛降级: baostock 免费源无逐日流通市值, 暂改用流动性代理。
  min_float_market_cap:
  max_float_market_cap:

score_weights:
  # Reweighted from 4.5y rank-IC (2022-01..2026-06, scripts/analyze_factor_ic.py).
  # reversal: only robustly POSITIVE factor every year & regime (t>4.5) -> primary.
  # momentum: 5-20d RPS, NEGATIVE IC every year & every regime at 1-10d horizon.
  #   Kept small pending the forward-h20/h60 long-horizon test (see analyze_factor_ic
  #   research factors); do NOT raise until that confirms medium-term momentum pays.
  # volume: ~0 IC across 4.5y/all regimes -> cut. sector: consistently mildly NEG.
  # market_cap: dead (no circ_mv on baostock).
  momentum: 0.10
  volume: 0.0
  sector: 0.05
  market_cap: 0.0
  reversal: 0.40
  fund_flow: 0.0
  pattern: 0.0
  sentiment: 0.0

# Regime-conditional weight multipliers (applied on top of score_weights per the
# day's market_regime). IC shows reversal's edge concentrates in weak/neutral
# (t=6.9 / 2.2); it is flat in strong (t~0.1) and only weakly positive in risk_off
# (t~0.9), so we throttle it where it is not proven. Absent regime -> identity.
regime_weight_multipliers:
  strong: {reversal: 0.3}
  risk_off: {reversal: 0.5}

selection:
  min_total_score: 70
  max_candidates: 20
  max_core_pool: 5
  max_per_sector: 2
  # Provisional, pending IC validation.
  max_sector_exposure: 0.40

# Provisional, pending IC validation.
rps:
  enabled: true
  min_cross_section: 20
  periods: [5, 10, 20, 60]
  composite_weights:
    rps_5: 0.35
    rps_10: 0.30
    rps_20: 0.25
    rps_60: 0.10
  filters:
    strong: {rps_20: 65}
    neutral: {rps_20: 75}
    weak: {rps_20: 85}
    risk_off: {allow_new_position: false}
  gate:
    rps_60_min: 60
    return_10d_min: -0.03

# Provisional, pending IC validation.
sector_rps:
  enabled: true
  min_cross_section: 5
  periods: [3, 5, 10, 20]
  composite_weights: {sector_rps_3: 0.35, sector_rps_5: 0.30, sector_rps_10: 0.25, sector_rps_20: 0.10}
  filters:
    strong: {sector_rps_5: 55, sector_rps_10: 50}
    neutral: {sector_rps_5: 60, sector_rps_10: 55}
    weak: {sector_rps_5: 75, sector_rps_10: 70}
    risk_off: {allow_new_position: false}

backtest:
  initial_cash: 1000000
  commission_rate: 0.0003
  # A 股券商单笔最低佣金 5 元, 小单成本不可忽略。
  min_commission: 5
  stamp_tax_rate: 0.0005
  slippage_rate: 0.001
  # 组合级回撤熔断: 距权益峰值回撤达到该比例后停止新开仓, 直至回撤收窄。
  # Provisional, pending backtest validation.
  max_portfolio_drawdown: 0.10
  benchmark_index: "000300.SH"
  # Provisional, pending backtest validation.
  max_holding_days: 10
  stop_loss: -0.05
  # Provisional, pending backtest validation.
  take_profit: 0.20
  # Provisional, pending backtest validation.
  trail_pct: 0.08
  # Provisional, pending backtest validation.
  ma_exit_period: 10
  max_positions: 5
  max_per_sector: 2
  # Provisional, pending IC validation.
  max_sector_exposure: 0.40
  # Provisional, pending IC validation.
  single_position_pct: 0.15
  max_participation: 0.05

continue_hold:
  enabled: true
  exit_below: 6

overheat:
  enabled: true
  rps5_threshold: 95
  large_gain_pct: 7
  volume_ratio_threshold: 2.5
  climax_rps5_threshold: 97
  climax_rps10_threshold: 95
  climax_gain_pct: 8
  stagnation_volume_ratio: 3
  stagnation_gain_pct: 3
  sector_stock_count_threshold: 10
  sector_rps5_threshold: 95
  sector_limit_up_ratio_threshold: 0.08

buy_rules:
  auction_confirm_min_pct: 0.0
  auction_confirm_max_pct: 0.05
  avoid_gap_up_pct: 0.07

sentiment:
  # 市场状态用近 N 日上涨家数占比均值平滑, 避免单日噪音让仓位阀门来回跳。
  confirm_days: 3
  # risk_off 需要跌停家数达到绝对恐慌阈值, 平静市场 3 比 2 不构成 risk_off。
  risk_off_min_limit_down: 30
  # strong 状态额外要求基准指数收于 MA20 上方。
  index_code: "000300.SH"

sector:
  backtest_sector_type: industry
  use_concept_in_backtest: false
  require_effective_date_for_concept_backtest: true
  use_concept_in_live: true

position:
  max_single_position: 0.20
  rating_a_position: 0.15
  rating_b_position: 0.10
  rating_c_position: 0.05
